workflows:
  android-workflow:
    name: Physics Studio Android
    max_build_duration: 60
    environment:
      flutter: stable
    scripts:
      - name: Get packages
        script: |
          cd physics_app
          flutter pub get
      - name: Build APK
        script: |
          cd physics_app
          flutter build apk --release
    artifacts:
      - physics_app/build/**/outputs/**/*.apk
