name: codemagic.yaml
description: OpenStax High School Physics — Notes, Quizzes, Formulas & Past Papers
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.2.2
  google_fonts: ^6.1.0
  flutter_markdown: ^0.6.18
  percent_indicator: ^4.2.3
  fl_chart: ^0.66.2
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
